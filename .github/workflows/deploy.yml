name: Tự động Build và Push Docker Image

on:
  push:
    branches:
      - main # Chạy tự động mỗi khi có code mới đẩy lên nhánh main

jobs:
  build_and_push:
    runs-on: ubuntu-latest # Chạy trên máy ảo Ubuntu

    steps:
      - name: Bước 1 - Checkout code
        uses: actions/checkout@v4
        # Lấy code từ GitHub repo về máy ảo

      - name: Bước 2 - Đăng nhập vào Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        # Sử dụng Secrets bạn vừa tạo ở Bước 2 để đăng nhập

      - name: Bước 3 - Build và Push Image lên Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: ./backend # <--- Sửa dấu chấm (.) thành ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/baitapchamdiem-backend:latest

      - name: Triển khai lên DevOps Classroom
        run: |
          REPO="vtht02/baitapchamdiem-backend"
          CONTAINER_PORT=80
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=3&container_port=$CONTAINER_PORT&strict_container_port=0")
          BODY=$(echo "$RESPONSE" | sed "$d")
          CODE=$(echo "$RESPONSE" | tail -n1)
          echo "Webhook HTTP: $CODE"
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy thất bại. Xem chi tiết trong nhóm log bên dưới."
            echo "::group::Chi tiết webhook JSON"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            exit 1
          fi
          echo "Deploy thành công."
          echo "::group::Chi tiết webhook JSON"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
