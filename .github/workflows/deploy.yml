name: Tự động Build và Push Docker Image

on:
  push:
    branches:
      - main # Chạy tự động mỗi khi có code mới đẩy lên nhánh main

jobs:
  build_and_push:
    runs-on: ubuntu-latest # Chạy trên máy ảo Ubuntu

    steps:
      - name: Bước 1 - Checkout code
        uses: actions/checkout@v4
        # Lấy code từ GitHub repo về máy ảo

      - name: Bước 2 - Đăng nhập vào Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        # Sử dụng Secrets bạn vừa tạo ở Bước 2 để đăng nhập

      - name: Bước 3 - Build và Push Image lên Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Tự động gán tag (thay "ten-image-cua-ban" bằng tên bạn muốn, ví dụ: spring-boot-app)
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/baitapchamdiem:latest
